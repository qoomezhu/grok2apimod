<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Token 管理</title>
  <link rel="icon" href="/static/favicon/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/common.css?v=3" rel="stylesheet">
  <link href="/static/token/token.css?v=13" rel="stylesheet">
  <link href="/static/common/toast.css" rel="stylesheet">
  <style>
    .filter-tab.active { background: #111; color: #fff; }
    .filter-tab { border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 12px; }
  </style>
</head>
<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="space-y-6 flex-1 container mx-auto max-w-6xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div class="flex flex-wrap justify-between items-start gap-3">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">Token 列表</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">已补齐 Workers 优先的批处理、分页、禁用状态、NSFW 统计与筛选。</p>
          <p class="text-[var(--accents-5)] mt-1 text-xs">批量刷新/批量 NSFW 已切换到后台任务轮询，避免单次请求在 Cloudflare Workers 中超时。</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button onclick="selectVisible()" class="geist-button-outline text-xs px-3">全选当前页</button>
          <button onclick="selectFiltered()" class="geist-button-outline text-xs px-3">全选筛选结果</button>
          <button onclick="clearSelection()" class="geist-button-outline text-xs px-3">清空选择</button>
          <button onclick="openImportModal()" class="geist-button-outline text-xs px-3">导入</button>
          <button onclick="startAllNsfw()" class="geist-button-outline text-xs px-3">全量开启 NSFW</button>
          <button onclick="addToken()" class="geist-button text-xs px-3">添加</button>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Token 总数</div></div>
        <div class="stat-card"><div class="stat-value text-green-600" id="stat-active">-</div><div class="stat-label">活跃</div></div>
        <div class="stat-card"><div class="stat-value text-orange-500" id="stat-cooling">-</div><div class="stat-label">限流/耗尽</div></div>
        <div class="stat-card"><div class="stat-value text-red-600" id="stat-invalid">-</div><div class="stat-label">失效/禁用</div></div>
        <div class="stat-card"><div class="stat-value text-fuchsia-600" id="stat-nsfw">-</div><div class="stat-label">NSFW 已开启</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-chat-quota">-</div><div class="stat-label">Chat 剩余</div></div>
        <div class="stat-card"><div class="stat-value text-blue-600" id="stat-image-quota">-</div><div class="stat-label">Image 剩余</div></div>
        <div class="stat-card"><div class="stat-value text-gray-400">URL</div><div class="stat-label">Video 输出</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-total-calls">-</div><div class="stat-label">总调用次数</div></div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">全部 <span id="tab-count-all">0</span></button>
        <button class="filter-tab" data-filter="active" onclick="setFilter('active')">活跃 <span id="tab-count-active">0</span></button>
        <button class="filter-tab" data-filter="cooling" onclick="setFilter('cooling')">冷却 <span id="tab-count-cooling">0</span></button>
        <button class="filter-tab" data-filter="exhausted" onclick="setFilter('exhausted')">耗尽 <span id="tab-count-exhausted">0</span></button>
        <button class="filter-tab" data-filter="invalid" onclick="setFilter('invalid')">失效 <span id="tab-count-invalid">0</span></button>
        <button class="filter-tab" data-filter="disabled" onclick="setFilter('disabled')">禁用 <span id="tab-count-disabled">0</span></button>
        <button class="filter-tab" data-filter="nsfw" onclick="setFilter('nsfw')">NSFW <span id="tab-count-nsfw">0</span></button>
        <button class="filter-tab" data-filter="no-nsfw" onclick="setFilter('no-nsfw')">未开启 NSFW <span id="tab-count-no-nsfw">0</span></button>
      </div>

      <div class="rounded-lg overflow-hidden bg-white overflow-x-auto">
        <table class="geist-table min-w-[1000px]">
          <thead>
            <tr>
              <th class="w-10"><input type="checkbox" id="select-all" class="checkbox" onclick="toggleSelectAll()"></th>
              <th class="w-48 text-left">Token</th>
              <th class="w-24">类型</th>
              <th class="w-24">状态</th>
              <th class="w-48 text-left">标签</th>
              <th class="w-20">额度</th>
              <th class="text-left">备注</th>
              <th class="w-56 text-center">操作</th>
            </tr>
          </thead>
          <tbody id="token-table-body"></tbody>
        </table>
        <div id="empty-state" class="hidden text-center py-12 text-[var(--accents-4)]">暂无数据</div>
      </div>

      <div class="flex items-center justify-between gap-3 text-sm text-[var(--accents-5)]">
        <div id="pagination-info">无数据</div>
        <div class="flex items-center gap-2">
          <select id="page-size" class="geist-input h-8 text-xs" onchange="changePageSize()"></select>
          <button id="page-prev" onclick="goPrevPage()" class="geist-button-outline text-xs px-3">上一页</button>
          <button id="page-next" onclick="goNextPage()" class="geist-button-outline text-xs px-3">下一页</button>
        </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <div id="batch-actions" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-20 bg-white border border-[var(--border)] rounded-full px-4 py-2 flex items-center shadow-lg gap-3 whitespace-nowrap">
    <div class="text-sm font-medium flex items-center gap-2">
      <span class="text-[var(--accents-5)] text-xs">已选择</span>
      <span class="bg-black text-white text-xs px-2 py-0.5 rounded-full" id="selected-count">0</span>
      <span class="text-[var(--accents-5)] text-xs">项</span>
    </div>
    <span class="toolbar-sep"></span>
    <div class="flex items-center gap-1">
      <button id="btn-batch-export" onclick="batchExport()" class="geist-button-outline text-xs px-3">导出</button>
      <button id="btn-batch-refresh" onclick="batchRefresh()" class="geist-button-outline text-xs px-3">刷新</button>
      <button id="btn-batch-disable" onclick="setSelectedStatus('disabled')" class="geist-button-outline text-xs px-3">禁用</button>
      <button id="btn-batch-enable" onclick="setSelectedStatus('active')" class="geist-button-outline text-xs px-3">启用</button>
      <button id="btn-batch-nsfw" onclick="batchNsfw()" class="geist-button-outline text-xs px-3">NSFW</button>
      <button id="btn-batch-delete" onclick="batchDelete()" class="geist-button-danger text-xs px-3">删除</button>
    </div>
    <div id="batch-progress" class="hidden text-xs text-[var(--accents-5)] flex items-center gap-2">
      <span class="toolbar-sep"></span>
      <span id="batch-progress-text"></span>
      <button id="btn-stop-action" type="button" class="batch-link" onclick="cancelCurrentJob()">取消任务</button>
    </div>
  </div>

  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h3 class="modal-title">批量导入 Token</h3>
        <button onclick="closeImportModal()" class="modal-close">×</button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="modal-label mb-1 block">目标 Pool</label>
          <select id="import-pool" class="geist-input">
            <option value="ssoBasic">ssoBasic</option>
            <option value="ssoSuper">ssoSuper</option>
          </select>
        </div>
        <div>
          <label class="modal-label mb-1 block">Token 列表（每行一个）</label>
          <textarea id="import-text" class="geist-input font-mono h-48" placeholder="一行一个 Token"></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeImportModal()" class="geist-button-outline text-xs px-3">取消</button>
          <button onclick="submitImport()" class="geist-button text-xs px-3">开始导入</button>
        </div>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-content modal-md">
      <div class="modal-header">
        <h3 id="edit-modal-title" class="modal-title">编辑 Token</h3>
        <button onclick="closeEditModal()" class="modal-close">×</button>
      </div>
      <div class="space-y-4">
        <input type="hidden" id="edit-token-original">
        <div>
          <label class="modal-label mb-1 block">Token</label>
          <input type="text" id="edit-token" class="geist-input font-mono" placeholder="sso=...">
        </div>
        <div>
          <label class="modal-label mb-1 block">类型</label>
          <select id="edit-pool" class="geist-input">
            <option value="ssoBasic">ssoBasic</option>
            <option value="ssoSuper">ssoSuper</option>
          </select>
        </div>
        <div>
          <label class="modal-label mb-1 block">额度</label>
          <input type="number" id="edit-quota" class="geist-input" min="-1">
        </div>
        <div>
          <label class="modal-label mb-1 block">备注</label>
          <input type="text" id="edit-note" class="geist-input" placeholder="可选备注" maxlength="80">
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeEditModal()" class="geist-button-outline text-xs px-3">取消</button>
          <button onclick="saveEdit()" class="geist-button text-xs px-3">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div id="confirm-dialog" class="modal-overlay hidden">
    <div class="modal-content modal-md">
      <div class="confirm-dialog-body">
        <div class="confirm-dialog-title">请确认</div>
        <div id="confirm-message" class="confirm-dialog-message"></div>
        <div class="confirm-dialog-actions">
          <button type="button" class="geist-button-outline text-xs px-3" onclick="closeConfirm(false)">取消</button>
          <button id="confirm-ok" type="button" class="geist-button-danger text-xs px-3" onclick="closeConfirm(true)">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/common/admin-auth.js?v=3"></script>
  <script src="/static/common/header.js?v=4"></script>
  <script src="/static/common/footer.js?v=1"></script>
  <script src="/static/common/toast.js"></script>
  <script src="/static/token/token.js?v=16"></script>
</body>
</html>
